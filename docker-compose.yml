services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: easyryde
      POSTGRES_USER: easyryde
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyryde"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - easyryde

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - easyryde

  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    environment:
      APP_NAME: EasyRyde
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?APP_KEY not set}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: easyryde
      DB_USERNAME: easyryde
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: redis
      LOG_CHANNEL: stderr
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
      MAIL_MAILER: ${MAIL_MAILER:-log}
    volumes:
      - vendor:/var/www/html/vendor
    user: root
    command: sh -c "chown -R appuser:appuser /var/www/html && su appuser -c 'php artisan storage:link || true' && php-fpm -R"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - easyryde

  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-8000}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
      - "${NGINX_HTTP_PORT:-8080}:8080"
    volumes:
      - vendor:/var/www/html/vendor
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - easyryde

  socket-server:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    ports:
      - "${SOCKET_PORT:-13099}:3001"
    environment:
      PORT: 3001
      CLIENT_URL: ${APP_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      APP_API_BASE_URL: ${SOCKET_API_BASE_URL:-http://nginx:8080}
      APP_API_TOKEN: ${SOCKET_SERVICE_TOKEN:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      REDIS_DB: 0
      STALE_LOCATION_TTL: 300
      CLEANUP_INTERVAL_MS: 60000
      DRIVER_RADIUS_KM: 10
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_PATH: /health
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - easyryde

  horizon:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    user: root
    command: sh -c "chown -R appuser:appuser /var/www/html && su appuser -c 'php artisan config:clear' && su appuser -c 'php artisan horizon'"
    volumes:
      - vendor:/var/www/html/vendor
    environment:
      APP_NAME: EasyRyde
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?APP_KEY not set}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: easyryde
      DB_USERNAME: easyryde
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: redis
      LOG_CHANNEL: stderr
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - easyryde

networks:
  easyryde:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  vendor:
