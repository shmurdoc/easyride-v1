name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.prod.yml build
          docker tag easyryde-php-fpm:latest $ECR_REGISTRY/easyryde-api:$IMAGE_TAG
          docker tag easyryde-nginx:latest $ECR_REGISTRY/easyryde-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/easyryde-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/easyryde-web:$IMAGE_TAG

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."

      - name: Run smoke tests
        run: |
          sleep 30
          curl --fail https://staging.easyryde.com/api/health
          echo "Smoke tests passed!"

      - name: Deploy to production (blue/green)
        run: |
          echo "Switching traffic to green deployment..."

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deploy successful: ${{ github.sha }} to production"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
