networks:
  frontend:
    driver: bridge
    name: easyryde_frontend
  backend:
    driver: bridge
    internal: true
    name: easyryde_backend

volumes:
  postgres_data:
  redis_data:
  easyryde_storage:

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - easyryde_storage:/var/www/html/storage:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./ssl-www:/var/www/html/letsencrypt
    networks:
      - frontend
      - backend
    depends_on:
      php-fpm:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  php-fpm:
    build:
      context: .docker/php
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html
      - easyryde_storage:/var/www/html/storage
    networks:
      - backend
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=easyryde
      - DB_USERNAME=easyryde
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - REDIS_CACHE_DB=1
      - REDIS_PREFIX=easyryde_
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgis/postgis:16-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    environment:
      POSTGRES_DB: easyryde
      POSTGRES_USER: easyryde
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyryde"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  socket-server:
    build:
      context: .
      dockerfile: .docker/socket/Dockerfile
    volumes:
      - ./socket-server:/app
    ports:
      - "13099:3001"
    networks:
      - frontend
      - backend
    environment:
      - NODE_ENV=production
      - APP_API_BASE_URL=http://nginx
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy

  horizon:
    build:
      context: .docker/php
      dockerfile: Dockerfile
    command: php artisan horizon
    volumes:
      - ./:/var/www/html
    networks:
      - backend
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=easyryde
      - DB_USERNAME=easyryde
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - REDIS_CACHE_DB=1
      - REDIS_PREFIX=easyryde_
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pgbouncer:
    image: edoburu/pgbouncer:latest
    networks:
      - backend
    environment:
      DB_USER: easyryde
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  certbot:
    image: certbot/certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl-www:/var/www/html/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend
